#
# ─── PRINCIPES DE PRIORITÉ (dans l'ordre) ─────────────────────────────────────────────
#   1. Backend prêt d'abord (`backend_ready`) — ne pas démarrer avant.
#   2. Dogfooding DG-1 — la tour de contrôle admin (revue KYC + entitlements + provisioning)
