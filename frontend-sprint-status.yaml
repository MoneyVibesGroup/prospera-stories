apps:
  client:
    name: "prospera-frontend-expert-comptable"
    role: "app cliente unique config-driven (relying party navigateur) — vertical pilote = cabinet"
    framework: "Next.js 16 (App Router, src/)"
    stack: "TypeScript · Tailwind + shadcn/ui · TanStack Query · React Hook Form + Zod · next-intl (FR)"
    deployment: "Docker, 1 code / N déploiements isolés, config par env (vertical, gateway, branding)"
    config_driven: true  # modules affichés selon NEXT_PUBLIC_VERTICAL + entitlements lus au runtime
    personas: ["TENANT_ADMIN", "TENANT_USER"]
  admin:
    name: "prospera-admin-panel"
    role: "console interne Money Vibes (PLATFORM_ADMIN) — BFF sans base, tour de contrôle"
    framework: "Next.js 16 (App Router, src/)"
    nature: "BFF (Route Handlers) — agrège/proxifie auth + kyc + catalog, relais JWT admin (AD-2)"
    deployment: "hébergé par Money Vibes (instance interne unique), Docker"
    shared_socle: "réutilise design system / client API / BFF cookie / shell communs à l'app cliente"
    personas: ["PLATFORM_ADMIN"]

