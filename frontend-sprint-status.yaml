# App frontend CABINET (personas TENANT_ADMIN / TENANT_USER). Périmètre et décisions
# de stack : voir docs/frontend-sprint-plan-expert-comptable-2026-07-08.md.
# Hors périmètre : revue KYC admin (FR-006) + dashboard plateforme (FR-012) => app admin-panel.
#
# Décisions transverses actées (2026-07-09) :
#  - Point d'entrée UNIQUE = gateway Traefik (routage préfixe /auth /ec /kyc). En dev,
#    NEXT_PUBLIC_API_BASE_URL bascule vers les ports directs (:3001 auth, :3002 kyc, :3000 ec).
#  - Contrats d'API : types TS générés depuis l'OpenAPI de la gateway (pas de types manuels).
#  - Refresh token : cookie httpOnly (Secure/SameSite) via BFF Next.js (src/app/api/auth/*) ;
#    access token en mémoire uniquement.
#
# STATUT DES STORIES :
#   backlog        : identifiée, pas encore de fichier story détaillé
#   ready-for-dev  : fichier story créé (create-story), contexte complet
#   in-progress    : implémentation en cours
#   review         : implémentée, en revue de code
#   done           : livrée, vérifiée

