      - { id: "AP-03", app: "admin", title: "Revue KYC (file, détail + pièces via URL présignée, comparaison OCR déclaré↔lu, approve/reject + motif)", epic: "AP-EPIC-001", points: 8, status: "ready-for-dev", backend_ready: "done", backend_ref: "STORY-013,045,048,105,107", note: "⬆️ RÉVISÉE 5→8 : l'enrichissement OCR (STORY-045) n'était pas au périmètre d'origine et c'est le cœur de la valeur — le BFF expose extraction{extracted,declared,discrepancies,flags{expired,unreadable},confidence,ocrProvider} par pièce + ocrSummary{hasDiscrepancies,anyUnreadable,anyExpired,extractedCount} par dossier. ⚠️ INVARIANT DO-1 : l'OCR est une ASSISTANCE, purement informative — l'UI ne doit jamais laisser croire qu'il décide ; l'humain tranche. ✅ CORRECTION 2026-07-17 (ma note précédente était FAUSSE sur 2 points, vérifiés dans le code) : (a) le BFF CONSOMME bien la file (kyc-service.client.listReviewQueue → GET /admin/kyc) et le détail, il ne faut donc rien réclamer de ce côté ; (b) les URLs présignées SONT exposées (KycDocument.url, traversée telle quelle, jamais journalisée) — je les avais dites « à vérifier ». ⚠️ SEUL VRAI ÉCART RESTANT : GET /admin/orgs enrichit chaque ligne d'un kycStatus (AdminOrgListItemDto) mais son filtre `status` porte sur l'IDENTITÉ (IDENTITY_STATUSES = ACTIVE|SUSPENDED), PAS sur le KYC ⇒ pas de filtrage serveur « en attente de revue » : le front devrait filtrer côté client À TRAVERS la pagination (faux dès que le volume croît). ✅ DEMANDE BACKEND FORMULÉE = **STORY-107** (3 pts, sprint 10 backend, à tirer avec 106) : exposer une route de file dans le BFF qui relaie `GET /admin/kyc?status=` (kyc-service SAIT DÉJÀ filtrer) + joint la raison sociale. ⚠️ Ma 1ʳᵉ formulation (« ajouter kycStatus à ListOrgsQueryDto ») était la MAUVAISE FORME : elle inverserait la source de pagination (auth pilote la page, le kycStatus est enrichi APRÈS). SANS 107, AP-03 reste livrable — le DÉTAIL est entièrement servi — mais la file serait fausse au-delà d'une page." }
      - { id: "FE-015", app: "client", title: "Profil du cabinet + Mon profil (GET|PATCH /organizations/me, GET /users/me) + retrofit identité du shell", epic: "FE-EPIC-002", points: 4, status: "review", backend_ready: "done", backend_ref: "STORY-023,026", note: "✅ 2026-07-22 — **PR #13 `fe-015`→`dev`**. Livrée sur le périmètre RÉELLEMENT servi ; maquette validée par le PO après 4 itérations. CONTENU : /parametres/cabinet (admin — en-tête d'identité + complétude qui NOMME ce qui manque, formulaire groupé n'envoyant QUE les champs modifiés, 400 routés au champ, pièces en lecture seule, slug/statut hors formulaire car PATCH dessus = 400) ; /mon-profil (2 rôles — identité, sécurité, thème réellement branché, cabinet) ; collaborateur sur /parametres/cabinet → REDIRECTION vers /mon-profil (décision PO, pas d'écran d'erreur) ; bloc d'activation RETIRÉ des 2 écrans (il pilote l'onboarding, pas la consultation) ; retrofit du shell (fin de DEMO_USER et « Cabinet Diallo »). ⚠️ BUG CORRIGÉ EN CHEMIN : le JWT porte `roles: string[]`+`perms[]`, pas un `role` scalaire → decodeClaims renvoyait toujours undefined ⇒ AUCUN admin ne voyait l'entrée « Utilisateurs » ; le stub E2E reproduisait la même hypothèse fausse. VÉRIF LIVE : complétude 33→67 %, PATCH avec la charge utile {phone} SEULE → 200, zéro erreur réseau. E2E profile.spec 5/5. NON LIVRÉ faute de backend, tracé en stories : aperçu pièces + date de validation (FE-022), logo/couleur (FE-023), sessions (FE-021), édition profil/mot de passe (FE-019/020)." }
      - { id: "FE-016", app: "client", title: "Renvoi d'invitation à un membre (POST /users/:id/resend-invitation)", epic: "FE-EPIC-002", points: 2, status: "review", backend_ready: "done", backend_ref: "STORY-008,026", note: "✅ 2026-07-22 — **PR #14**. Contrat CONFRONTÉ avant de coder : INVITED→200 ; ACTIVE→409 ; **id inconnu→409 AUSSI (pas 404)** donc l'UI ne peut pas distinguer les deux cas ; ⚠️ **AUCUN THROTTLE** (4 appels = 4 e-mails, alors que resend-verification en a un) → verrou de 30 s côté client, à retirer quand le backend limitera la cadence. ⚠️ À MERGER APRÈS LA PR #13 : sans le correctif roles[] du JWT, /users affiche « accès réservé » à un vrai admin et la fonctionnalité est invisible." }
      - { id: "FE-018", app: "client", title: "Le cabinet voit ce que l'OCR a lu de ses pièces (déclaré↔lu) — GET /documents/:id/extraction", epic: "FE-EPIC-003", points: 3, status: "review", backend_ready: "done", backend_ref: "STORY-044,045", note: "✅ 2026-07-22 — **PR #15**. ⚡ PLACEMENT CORRIGÉ PAR LE PO : la lecture est déclenchée par le DÉPÔT → le bloc s'affiche DANS la carte du document (écran KYC), pas dans un onglet séparé (ma 1ʳᵉ maquette en avait fait une page, ce qui trahissait le moment réel). Types GÉNÉRÉS depuis l'OpenAPI :3006 (document-service ajouté à gen:api). ⚠️ extracted/declared/discrepancies = SACS DE CLÉS LIBRES (additionalProperties) ⇒ le tableau parcourt l'UNION des clés, aucun champ codé en dur ; les divergences signalées par le backend priment sur la comparaison naïve (lui seul normalise accents/casse). 404 = analyse en cours (reprise 8 s, jamais d'erreur) ; 403/réseau = bloc muet. Invariant DO-1 verrouillé par test : même sans écart, l'écran dit que cela ne vaut pas validation. Vérif live :3006 → 404/401/préflight CORS 204." }
      - { id: "FE-021", app: "client", title: "Sessions ouvertes — voir et fermer les appareils connectés", epic: "FE-EPIC-002", points: 3, status: "blocked", backend_ready: "S16", backend_ref: "STORY-126", note: "🆕 2026-07-22 (maquette FE-015 validée). ⚠️ BLOQUÉE PAR UN DÉFAUT DE CONCEPTION, pas par un simple manque : l'IdP stocke un `refreshTokenHash` SCALAIRE sur l'utilisateur ⇒ aucune session à lister, et surtout **une connexion sur un 2ᵉ appareil invalide silencieusement la 1ʳᵉ**. STORY-126 crée la collection de sessions (userAgent/ip/dates) + révocation ciblée." }
      - { id: "FE-022", app: "client", title: "Aperçu des pièces du cabinet + date de validation par pièce", epic: "FE-EPIC-003", points: 3, status: "review", backend_ready: "done", backend_ref: "STORY-127,128", note: "✅✅ 2026-07-23 — IMPLÉMENTÉE, branche `fe-022` POUSSÉE (PR vers dev à ouvrir : compare/dev...fe-022). Carte Documents (/parametres/cabinet) : aperçu par URL présignée (window.open noopener — jamais de <a href> partageable ni de journal), verdict+date PAR PIÈCE (PENDING = « En attente », jamais la date du dossier), historique des versions remplacées à verdict FIGÉ, motif au niveau dossier, « Actualiser » re-signe les liens. Types RÉGÉNÉRÉS depuis :3002 réel ; garde de compilation : reviewStatus requis a cassé 2 fixtures kyc → mises au contrat. PREUVES : 49 unit + 7 E2E verts (2 specs FE-022 dans profile.spec), lint/typecheck/build verts. ⚡ EN CHEMIN : dev de kyc-service ne compilait plus (2 barrels cassés du générateur IDE, commit « mise a jour ») → fix local kyc-service@dev `9209512` NON POUSSÉ. — CONTEXTE : ✅ DÉBLOQUÉE 2026-07-22 — les DEUX backends sont livrés : STORY-127 (url présignée par pièce sur GET /kyc/status, toutes versions y compris SUPERSEDED) et STORY-128 (reviewStatus PENDING|APPROVED|REJECTED + reviewedAt PAR PIÈCE). ⚠️ 2 points à connaître AVANT de coder : (1) une pièce non revue est PENDING SANS reviewedAt — afficher « En attente », ne JAMAIS retomber sur le reviewedAt GLOBAL du dossier (qui reste servi, mais se rapporte au dossier) ; (2) il N'Y A PAS de motif par pièce — le rejectionReason reste au niveau dossier (décision actée en 128), donc le critère 3 « son motif s'il est servi » se lit : motif du dossier. Types à régénérer depuis l'OpenAPI. — CONTEXTE D'ORIGINE : 🆕 2026-07-22. GET /kyc/status ne sert au cabinet NI l'URL de ses propres pièces (l'URL présignée n'existe que sur le DTO admin — Money Vibes peut relire les papiers du cabinet, le cabinet non) NI une date de validation par pièce (seul un reviewedAt global au dossier). FE-015 n'affiche donc que type/format/taille/version/date d'envoi." }
      - { id: "FE-023", app: "client", title: "Identité visuelle du cabinet — logo téléversable + couleur de marque", epic: "FE-EPIC-002", points: 3, status: "review", backend_ready: "done", backend_ref: "STORY-129", note: "✅ 2026-07-24 — IMPLÉMENTÉE, branche `fe-023` POUSSÉE (PR vers dev à ouvrir : compare/dev...fe-023). Carte « Identité visuelle » (/parametres/cabinet) : upload PNG/JPG/SVG 1 Mo avec progression, remplacement, suppression ; refus 413/415 rendus AVEC LE MESSAGE DU BACKEND ; six teintes + choix libre, hex normalisé en #RRGGBB avant envoi ; aperçu immédiat en-tête de document + tuile ; `LogoTile` partagé consommé par le shell (sidebar), repli initiales FE-015. Couleur de texte DÉRIVÉE (luminance WCAG) — le piège orange #FF6633 reçoit du texte noir, verrouillé par test teinte par teinte. `uploadMultipart` mutualisé avec l'upload KYC (7 tests neufs sur une couche qui n'en avait aucun). PREUVES : 318 unit + 47 E2E verts, lint/typecheck/build verts. ⚡ INTEGRATION GATE PASSÉ EN VRAI NAVIGATEUR contre le stack docker (compte réel créé par l'API) : image RÉELLEMENT chargée (naturalWidth>0) depuis localhost:9000, logo repris dans la sidebar sans rechargement, 415 serveur affiché tel quel via un PDF déguisé en .png, couleur relue après rechargement, suppression → initiales + 0 objet orphelin dans le bucket. ⚠️⚠️ ÉCART D'INFRA TROUVÉ PAR CE GATE (backend/ops, PAS front) : le docker-compose RACINE ne câblait PAS `MINIO_PUBLIC_ENDPOINT` pour auth-service ⇒ `logoUrl` sortait signée sur `http://minio:9000`, hôte NON résoluble par un navigateur ⇒ AUCUNE image ne se chargeait côté client, alors que la vérification de STORY-129 (faite en curl depuis le réseau docker) était verte. Corrigé dans le compose racine (MINIO_ENDPOINT/PORT internes + MINIO_PUBLIC_ENDPOINT=localhost + bucket org-branding). LEÇON : une URL présignée ne se vérifie qu'avec le client qui la consommera. — Historique : 🔓 DÉBLOQUÉE 2026-07-23 — STORY-129 LIVRÉE (MNV-129 sur origin/dev, vérifiée sur l'OpenAPI servi : POST|DELETE /organizations/me/logo + brandColor ; sanitizer SVG durci en 3 passes de revue sécurité). L'UI garde son propre garde-fou : logo rendu via <img> uniquement, jamais de SVG inline. Historique : 🆕 2026-07-22 (demande PO). OrganizationResponseDto porte id/name/slug/phone/country/address/status : NI logo NI couleur, et aucune route d'upload. ⚠️ garde-fou de périmètre acté : la couleur habille le logo par défaut et les DOCUMENTS PRODUITS, elle ne repeint pas la navigation de Prospera. ⚠️ si le backend accepte les SVG, ne jamais les injecter en ligne dans le DOM." }

  # ── S5 : allumer un module — LA boucle qui justifie toute la topologie ─────────────────
  #   ⚡ POURQUOI AP-05 ET FE-014 SONT DANS LE MÊME SPRINT : l'octroi et l'allumage sont les deux
  #   moitiés d'UNE seule preuve (admin grant → entitlement.changed → le module apparaît côté client).
  #   Les séparer = livrer deux demi-fonctionnalités dont aucune n'est démontrable seule. C'est
  #   l'illustration la plus nette du principe 0.
  - sprint_number: 5
    name: "Allumer un module : catalogue + entitlements (admin) ⇄ shell config-driven (client)"
    status: "ready-for-dev"
    committed_points: 18
    goal: "DÉMO DE BOUCLE : l'admin octroie l'entitlement `bilan` à l'org Money Vibes → entitlement.changed → l'app cliente affiche le module. C'est la preuve du dogfooding DG-1 ET de la topologie config-driven (Option B)."
    backend_dependency: "AUCUNE — platform-catalog EPIC-007 (031→034) clos + admin-panel 048 done"
    stories:
      - { id: "AP-04", app: "admin", title: "Catalogue : CRUD Module/ModuleVersion/ReferentielVersion + garde-fou N/N-1 + checksum", epic: "AP-EPIC-002", points: 5, status: "ready-for-dev", backend_ready: "done", backend_ref: "STORY-032" }
      - { id: "AP-05", app: "admin", title: "Entitlements : grant/update/revoke (module × org × référentiel) + réconciliation (allume un module dans l'app cliente)", epic: "AP-EPIC-002", points: 5, status: "ready-for-dev", backend_ready: "done", backend_ref: "STORY-033,034,048" }
      - { id: "FE-014", app: "client", title: "Accès modules & entitlements : home des modules + shell config-driven (n'affiche que les modules ACTIFS ; gate KYC/abonnement/entitlement)", epic: "FE-EPIC-006", points: 5, status: "ready-for-dev", backend_ready: "done", backend_ref: "STORY-014,033,034", note: "⬅️ déplacée du sprint 2 (v3.0.0). Lit GET /catalog/entitlements/:orgId — le TENANT_ADMIN lit SA propre org, l'anti-énumération est déjà en place côté backend (STORY-033). Gate KYC/sub via /tenant/state (FE-INT-3). Volet abonnement DÉGRADÉ = activation manuelle par l'admin (DG-1, paiement en S16)." }
      - { id: "FE-017", app: "both", title: "e2e inter-apps : l'admin octroie → le module apparaît côté client (Playwright, stack docker réel)", epic: "FE-EPIC-006", points: 3, status: "ready-for-dev", backend_ready: "done", backend_ref: "STORY-034,048", note: "🆕 2026-07-17 — première story `app: both`. Fige la boucle dogfooding comme test de non-régression : sans elle, rien ne garantit que le grant admin reste visible côté client après un refactor. Miroir frontend du `npm run test:chain` backend (STORY-049)." }

  # ── S6 : admin-panel v1 🏁 (provisioning + dashboard + délégation RBAC) ────────────────
  - sprint_number: 6
    name: "admin-panel v1 🏁 : provisioning + dashboard + RBAC plateforme"
    status: "not_started"
    committed_points: 25  # ⬆️ 18→25 (2026-07-22) : + la TRANCHE « AUTONOMIE DU COMPTE » = FE-019 (3) + FE-020 (2) + AP-09 (2) = 7 pts, moitié frontend de STORY-123/124/125 (backend S16). Voir `risk` : ces 7 pts sont l'absorbeur DÉSIGNÉ du glissement d'AP-08.
    goal: "L'admin provisionne un vertical pour une org, supervise (dashboard), et DÉLÈGUE : inviter un opérateur, composer un rôle depuis le catalogue de permissions. 🏁 admin-panel v1. + TRANCHE AUTONOMIE DU COMPTE, sur les DEUX apps : le membre du cabinet corrige son profil / son mot de passe / son e-mail (FE-019), et PLUS PERSONNE n'est définitivement perdu sur un mot de passe oublié — côté cabinet (FE-020) comme côté console (AP-09)."
    backend_dependency: "⚠️ AP-08 dépend de STORY-106 (admin-panel : guards par permission + proxy des routes de gestion 104) — NON LIVRÉE (reliquat sprint 10 backend, 29/34). AP-06/AP-07 n'ont aucune dépendance ouverte. ⛔ FE-019/FE-020/AP-09 dépendent de STORY-123/124/125 (backend S16) — NON LIVRÉES : ces 3 stories ne démarrent pas avant, il n'y a littéralement rien à appeler."
    risk: "PARI ASSUMÉ (décision user 2026-07-17) : AP-08 est planifiée ICI en supposant STORY-106 livrée d'ici là. Si elle glisse, ce sprint tombe à 10 pts → replan. ⚡ 2026-07-22 — LE REPLAN EST DÉSORMAIS INTÉGRÉ : la tranche « autonomie du compte » (FE-019/FE-020/AP-09, 7 pts) est le CANDIDAT DE REPLI DÉSIGNÉ. Sprint à 25 pts si TOUT se débloque ; à 17 pts (≈ la cible ~18) si AP-08 glisse — c'est-à-dire que le sprint reste sain dans les DEUX cas. La tranche identité a en outre sa propre dépendance (backend S16) : si ELLE glisse, AP-08 absorbe symétriquement. Les deux paris ne peuvent pas tomber du même côté."
    stories:
      - { id: "AP-06", app: "admin", title: "Provisioning d'un vertical pour une org (cabinet/imf/distributeur/assurance → séquence d'entitlements, pré-requis KYC)", epic: "AP-EPIC-003", points: 5, status: "ready-for-dev", backend_ready: "done", backend_ref: "STORY-033,034" }
      - { id: "AP-07", app: "admin", title: "Dashboard plateforme + e2e chaîne KYC bout-en-bout 🏁", epic: "AP-EPIC-003", points: 5, status: "ready-for-dev", backend_ready: "done", backend_ref: "STORY-049" }
      - { id: "AP-08", app: "admin", title: "RBAC plateforme : membres (invitation org-less + attribution de rôle) + composition de rôles depuis le catalogue de permissions + masquage d'UI sur perms[] (amende AP-01)", epic: "AP-EPIC-000", points: 8, status: "blocked", backend_ready: "S10", backend_ref: "STORY-103,104,105,106", note: "🆕 2026-07-17 — GAP MAJEUR : le backend a livré D15/EPIC-025 (103/104/105 done le 2026-07-16 : catalogue de 8 permissions AVEC libellés, rôles système seedés non supprimables, perms[] dans le JWT, CRUD rôles, invitation plateforme org-less POST /admin/users, PATCH du rôle d'un opérateur) et AUCUNE story frontend ne le couvrait — alors que STORY-104 expose les libellés EXPLICITEMENT pour un panel. ⚠️ BLOQUÉE par STORY-106 : sans le proxy BFF, le front n'a aucune route vers /admin/roles et /admin/users, et le gating perms[] resterait COSMÉTIQUE (le BFF refuse tout non-PLATFORM_ADMIN à sa propre porte). Garde-fous backend à refléter dans l'UI : anti god-mode (on ne peut pas octroyer une permission qu'on n'a pas), anti-lockout (dernier PLATFORM_ADMIN), `name` de rôle non éditable (renommer = créer+réattribuer+supprimer)." }
      - { id: "FE-019", app: "client", title: "Mon profil : le membre corrige son identité + son téléphone, change son mot de passe et son e-mail (PATCH /users/me · POST /users/me/password · POST /users/me/email)", epic: "FE-EPIC-002", points: 3, status: "review", backend_ready: "S16", backend_ref: "STORY-123,124", note: "✅ 2026-07-23 — IMPLÉMENTÉE, branche `fe-019` POUSSÉE (PR : compare/dev...fe-019). 3 blocs (identité PATCH partiel · mot de passe avec révocation assumée → /login · e-mail 202 non affirmatif + pendingEmail annulable) ; AUCUN RBAC (prouvé par test) ; politique mdp alignée RegisterDto. PREUVES : 44 unit isolés · 106/106 complet · 28/28 E2E · lint/typecheck/build verts. — 🆕 2026-07-22 — GAP remonté PAR FE-015 puis VÉRIFIÉ dans les contrôleurs de l'IdP : `GET /users/me` existe, mais AUCUNE route ne permet à un membre d'agir sur son propre compte (`PATCH /users/:id` est @Roles(TENANT_ADMIN) et ne touche QUE role+status) et AUCUN rôle ne peut changer un mot de passe. La maquette « Mon profil » est donc EN LECTURE SEULE avec la mention « demande à formuler côté auth-service » → ⚡ LA DEMANDE EST FORMULÉE : **STORY-123** (identité + téléphone + mot de passe + identity.user.updated, 5 pts) et **STORY-124** (e-mail VÉRIFIÉ, 3 pts), backend **S14**. ⛔ BLOQUÉE tant que 115 n'est pas livrée — il n'y a littéralement rien à appeler. DÉCOUPLAGE si 116 glisse : livrer Identité + Mot de passe, masquer le bloc E-mail (la story reste démontrable). ⚠️ 2 comportements backend à rendre CORRECTEMENT dans l'UI, sous peine de ressembler à des bugs : (a) un changement de mot de passe RÉVOQUE le refresh token ⇒ message explicite + redirection /login, jamais un 401 subi ; (b) la demande de changement d'e-mail répond **202 même si l'adresse est déjà prise** (anti-énumération) ⇒ formuler « si cette adresse est disponible, un lien y a été envoyé », et dire que l'ANCIENNE adresse reste l'identifiant de connexion jusqu'à confirmation. ⚡ AUCUN RBAC : tout membre édite SON profil (différence de fond avec FE-015, réservé au TENANT_ADMIN). Ne touche NI le profil du cabinet NI le retrofit du shell (FE-015)." }
      - { id: "FE-020", app: "client", title: "Mot de passe oublié — récupération de compte (POST /auth/forgot-password · POST /auth/reset-password)", epic: "FE-EPIC-001", points: 2, status: "review", backend_ready: "S16", backend_ref: "STORY-125", note: "✅ 2026-07-23 — IMPLÉMENTÉE, branche `fe-020` POUSSÉE (PR : compare/dev...fe-020). 2 écrans PUBLICS (groupe (auth), hors garde AppShell — AC 9 prouvé) + lien depuis le login. Anti-énumération : écran de succès non affirmatif et identique quel que soit le sort de l'adresse ; token absent → erreur sans appel réseau ; 400 → sortie « refaire une demande » ; politique mdp alignée RegisterDto. ⚡ ROUND-TRIP LIVE MAILHOG PROUVÉ : forgot 202 → lien lu (pointe sur :3100) → reset 204 → login nouveau 200 → ancien 401 → token rejoué 400. Config STORY-125 (PASSWORD_RESET_URL_TENANT/_PLATFORM) injectée au compose racine (faite en FE-019). PREUVES : 59 unit auth · 35/35 E2E (7 FE-020) · lint/typecheck/build verts. — 🆕 2026-07-22 — DEMANDE EXPLICITE DU PO. Aujourd'hui un mot de passe oublié = un COMPTE PERDU : l'IdP n'a ni forgot-password ni reset-password, et aucune réinitialisation assistée (vérifié dans le code). Backend = STORY-125 (S14), ⛔ bloquante. 2 écrans publics (/mot-de-passe-oublie, /reinitialiser-mot-de-passe?token=) + lien « Mot de passe oublié ? » sur /login (FE-005 ne l'a pas — il n'y avait rien derrière). ⚠️ 2 comportements à rendre CORRECTEMENT : (a) le backend répond **202 même pour une adresse inconnue** (anti-énumération) ⇒ message NON AFFIRMATIF obligatoire « si un compte existe pour cette adresse, un lien vient d'y être envoyé », jamais « e-mail envoyé à … » ni « aucun compte trouvé », et aucun signal par le comportement (même délai perçu, pas de champ rouge) ; (b) token invalide/expiré/déjà utilisé → 400 avec un chemin de SORTIE (refaire une demande), jamais une erreur sans issue. ⚡ PIÈGE N°1 : les 2 écrans sont PUBLICS — la garde de routes de FE-005 ne doit PAS les rediriger vers /login, sinon la récupération devient inatteignable précisément quand on en a besoin (test dédié). ⛔ Le front ne déclare JAMAIS son URL de retour : la cible est une config SERVEUR (PASSWORD_RESET_URL_TENANT) et tout champ de redirection dans le corps est rejeté en 400 (garde anti-redirection ouverte). Preuve attendue : parcours navigateur complet avec le lien LU DANS MAILHOG. Story sœur : AP-09." }
      - { id: "AP-09", app: "admin", title: "Mot de passe oublié — récupération de compte pour les opérateurs plateforme (console admin)", epic: "AP-EPIC-000", points: 2, status: "blocked", backend_ready: "S16", backend_ref: "STORY-125", note: "🆕 2026-07-22 — DEMANDE EXPLICITE DU PO (« mais aussi au niveau de l'admin-panel »). ⚠️ C'EST ICI QUE LE TROU EST LE PLUS GRAVE : les comptes plateforme sont SEEDÉS (seed-platform-admin.ts) ou créés par invitation org-less (STORY-104), et platform-users.controller.ts n'expose que POST/GET/PATCH-rôle ⇒ AUCUN PLATFORM_ADMIN ne peut débloquer un PLATFORM_KYC_OFFICER qui a oublié son mot de passe → seule issue actuelle = rejouer un seed À LA MAIN EN PRODUCTION. Impasse d'exploitation. STORY-125 traite les 2 publics avec LE MÊME CODE ⇒ AP-09 est délibérément MINCE : 2 pages + 2 Route Handlers de pass-through dans le BFF (le panel est un BFF SANS BASE, il ne possède aucune identité). ⚡ AC DISTINCTIF vs FE-020 : le lien reçu par e-mail doit ramener SUR LA CONSOLE, pas sur l'app cabinet — le backend déduit la cible du compte (platformRole → PASSWORD_RESET_URL_PLATFORM) ; à prouver en bout-en-bout, lien lu dans Mailhog, sur un VRAI compte plateforme. ⚡ PIÈGE N°1 : les 2 écrans ET les 2 routes du BFF sont PUBLICS — ne pas les placer derrière la garde PLATFORM_ADMIN d'AP-01 ni les proxifier avec un jeton (elles sont appelées PAR DÉFINITION par quelqu'un qui n'est pas connecté) ; test dédié. Anti-énumération d'autant plus sensible ici que l'annuaire visé est celui des employés Money Vibes. Le BFF ne journalise NI le corps NI le token (le token vaut le compte)." }

