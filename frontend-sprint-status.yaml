#   S10+S15-19, paiement-service S20) N'EST PAS ENCORE CONSTRUIT.
# Le frontend TRAILE la dispo backend : une story frontend ne démarre qu'une fois son
#   `backend_ready` atteint. `backend_ready` = sprint backend où l'API existe (done = déjà livré).
