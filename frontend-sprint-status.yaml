# ═══════════════════════════════════════════════════════════════════════════════════════
# RÉVISION v2 (2026-07-12) — Programme multi-frontend PROSPERA / Money Vibes
# ───────────────────────────────────────────────────────────────────────────────────────
# Le frontend n'est plus « une app cabinet » isolée mais un PROGRAMME piloté par l'admin-panel
# Money Vibes. Décisions actées (voir addendum du plan md et frontend-sprint-plan-admin-panel-*) :
#
#  TOPOLOGIE (Option B) : UNE app cliente unique, configurable, qui affiche ses modules selon
#    le type de vertical + les entitlements (configurés dans l'admin-panel). Ce fichier suit CETTE
#    app (démarrée sur les modules du cabinet expert-comptable, puis étendue aux verticaux).
#    L'admin-panel Money Vibes est une app SÉPARÉE (persona PLATFORM_ADMIN) → tracker dédié
#    frontend-admin-sprint-status.yaml.
#
#  DÉPLOIEMENT : « 1 code / N déploiements isolés ». Même image Docker, configurée par env
#    (NEXT_PUBLIC_API_BASE_URL = gateway de l'instance, NEXT_PUBLIC_VERTICAL, branding, locale).
#    Instance MV/cabinet hébergée par MV ; instances externes (IMF…) déployables sur le cloud
#    du client. App CONTAINERISÉE et 100% configurable par env (aucune URL/branding en dur).
#
#  ALIGNEMENT BACKEND (PLAN FINAL 2026-07-10, docs/sprint-status.yaml) : le frontend SUIT la
#    dispo backend (~1 sprint de retard). Backend livré = auth-service (identité) + expert-comptable
#    relying party + kyc-service (KYC event-driven). À venir : catalog (entitlements, S7),
#    bilan-service (Module 1, S8-14), paiement-service (Module 2, S15, ~déc. 2026).
#
#  CHANGEMENTS vs plan 2026-07-08 :
#    + FE-EPIC-005 (Bilan & Prévisionnel) : ~16 stories FE-B00→FE-B15 dérivées du PRD Bilan
#      (docs/prd-bilan-service-2026-07-10.md, FR-001→FR-024), calées sur EPIC-009→014 backend.
#    + FE-EPIC-006 (Accès modules & entitlements) : FE-014, shell config-driven piloté par
#      entitlements (le vertical n'affiche que les modules ACTIFS).
#    ~ Paiement (FE-011/012/013) DÉPLACÉ de FE-2 vers FE-7 (JIT), aligné paiement-service Module 2.
#    ~ FE-2 re-scopé : Users + KYC + Onboarding + accès modules (payment retiré).
# ═══════════════════════════════════════════════════════════════════════════════════════

# App frontend CLIENTE (personas TENANT_ADMIN / TENANT_USER), démarrée sur le vertical cabinet
# (expert-comptable). Périmètre et décisions de stack : docs/frontend-sprint-plan-expert-comptable-2026-07-08.md
# (+ addendum v2). Hors périmètre : tout ce qui relève de PLATFORM_ADMIN (revue KYC, entitlements,
# catalogue, dashboard, provisioning) => app admin-panel (frontend-sprint-plan-admin-panel-2026-07-12.md).
#
# Décisions transverses actées (2026-07-09, inchangées) :
#  - Point d'entrée UNIQUE = gateway Traefik (routage préfixe /auth /ec /kyc /bilan /pay). En dev,
#    NEXT_PUBLIC_API_BASE_URL bascule vers les ports directs.
#  - Contrats d'API : types TS générés depuis l'OpenAPI de la gateway (pas de types manuels).
#  - Refresh token : cookie httpOnly (Secure/SameSite) via BFF Next.js (src/app/api/auth/*) ;
#    access token en mémoire uniquement.
#
# STATUT DES STORIES :
#   backlog        : identifiée, pas encore de fichier story détaillé
#   ready-for-dev  : fichier story créé (create-story), contexte complet
#   in-progress    : implémentation en cours
#   review         : implémentée, en revue de code
#   done           : livrée, vérifiée

