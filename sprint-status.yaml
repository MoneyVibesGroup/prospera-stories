# Révision 2026-07-04 : re-cadrage écosystème (voir docs/architecture-prospera-ecosystem-2026-07-04.md).
# PROSPERA devient un écosystème multi-vertical. Ordre d'extraction : auth-service (IdP, racine)
# → expert-comptable relying party → kyc-service rebasé → FedaPay. Bus inter-services = Kafka ;
# jetons RS256/JWKS émis par auth-service ; Redis/BullMQ = jobs internes uniquement.
# Révision 2026-07-07 : capacités partagées P7/P8 (architecture-{catalog,bilan}-service-2026-07-07.md).
# Ajout EPIC-007 catalog-service (catalogue + entitlements + topic entitlement.changed) puis
# EPIC-008 bilan-service (squelette : read-models + gate rejoué + référentiel pluggable ; le
# fonctionnel comptable = EPIC-009, en attente du PRD/tech-spec Bilan dédié). Séquence complète :
# auth → EC relying party → kyc rebasé → FedaPay (fin MVP vertical) → catalog → bilan → verticaux futurs.
# Révision 2026-07-10 (PLAN FINAL — docs/synthese-services-prospera-2026-07-10.md) : re-cadrage programme.
# Dogfooding interne (Money Vibes Group = client zéro) ; 18 modules → 18 services (voir program_backlog).
# Décisions actées : NC-1 (catalog-service → platform-catalog-service) ; AD-2 (chaîne KYC d'abord :
# admin-panel v1 + document-service v1 OCR livrés en 1er, sept. 2026 → décale Bilan +1 mois) ;
# NB-1 (Bilan v1 par import de balance + prévisionnel = EPIC-009) ; PA-1 (EPIC-004 rescopé :
# checkout/webhooks → paiement-service PI SPI BCEAO/FedaPay ; plans/abonnement → vertical) ;
# DG-1 (dogfooding : N/N-1 & routage multi-version différés jusqu'au 1er client externe).
# Ordre de construction Phase 1/2 : voir program_backlog. Sprints 7+ à re-planifier JIT par module.
services:
  - name: "expert-comptable"
    port: 3000
    database: "expert_comptable"
    role: "vertical métier (relying party)"
  - name: "auth-service"
    port: 3001
    database: "auth_service"
    role: "IdP (émetteur JWT RS256, identité)"
    status: "in_progress"  # STORY-022→027 done (scaffold+Kafka, identité, RS256/JWKS, vérif e-mail/invitations, users/rôles/seed, événements identity.* + admin orgs). EPIC-005 clos. EPIC-006 clos 2026-07-09 : EC est désormais relying party PUR (STORY-028 JWKS, 029 read-models, 030 cutover) — l'IdP est l'unique propriétaire d'identité
  - name: "kyc-service"
    port: 3002
    database: "kyc_service"
    role: "capacité partagée KYC (relying party)"
    status: "in_progress"  # STORY-020 (scaffold + migration KYC) + STORY-021 (events kyc.status.changed via outbox transactionnel + read-model EC + e-mails) done & vérifiés docker bout-en-bout 2026-07-10. KYC event-driven de bout en bout. + STORY-040 (2026-07-13, EPIC-015/Module 0) : kyc-service émet aussi kyc.document.uploaded via outbox transactionnel au dépôt de pièce (prérequis document-service DO-1) — vérifié docker. Reste EPIC-003 : STORY-013 (revue admin → transitions APPROVED/REJECTED, déjà émises par l'outbox), 014 (TenantStateGuard lisant le read-model)
  - name: "platform-catalog-service"  # ex catalog-service (renommage NC-1, PLAN FINAL 2026-07-10)
    port: 3003
    database: "catalog_service"
    role: "capacité plateforme : catalogue modules/versions/référentiels + entitlements (relying party)"
    status: "in_progress"  # EPIC-007 (STORY-031→034) TERMINÉ & vérifié docker 2026-07-13 — architecture-catalog-service-2026-07-07.md. STORY-031 (scaffold relying party RS256/JWKS + health + Kafka squelette) + STORY-032 (catalogue Module/ModuleVersion/ReferentielVersion + admin CRUD PLATFORM_ADMIN + garde-fou N/N-1 + machine d'états ; whoami retiré) + STORY-033 (entitlements (org×module) : upsert idempotent + validation cohérence + révocation soft + réconciliation + anti-énumération) + STORY-034 (events entitlement.changed via transactional outbox : upsert/revoke sous withTransaction, état absolu clé orgId, C8 M2M différé STORY-039) done. EPIC-007 CLOS ; le catalog est source de vérité DIFFUSÉE des entitlements (prêt pour bilan-service STORY-036 + admin-panel). Branches poussées : dev + MNV-031 (mergée) + MNV-032 (mergée) + MNV-033 (PR ouverte) + MNV-034 (stackée sur MNV-033). Statut service → passera "done" quand MNV-033+MNV-034 seront mergées dans dev.
  - name: "bilan-service"
    port: 3004
    database: "bilan_service"
    role: "capacité partagée : états financiers, moteur pluggable par référentiel (relying party)"
    status: "in_progress"  # EPIC-008 (STORY-035→038, squelette) TERMINÉ & vérifié docker 2026-07-14 : scaffold 035 + read-models 036 + gate @RequiresBilanAccess 037 + ReferentielLoader/moteur squelette 038 (interface ReferentielPackage P7, artefact embarqué + sha256 + cache, moteur SANS calcul comptable). EPIC-008 CLOS — prêt pour EPIC-009 (moteur v1 = import balance + table SYSCOHADA/SFD + états + prévisionnel, NB-1) → PRD Bilan (docs/prd-bilan-service-*.md). Reste : merge MNV-038 dans dev.
  - name: "paiement-service"
    port: 3005
    database: "paiement_service"
    role: "capacité plateforme : checkout/webhooks PI SPI BCEAO + FedaPay, abonnements (relying party)"
    status: "proposed"  # Module 2 (déc. 2026) — EPIC-004 rescopé (PA-1) ; dépend PS-1 (accès SPI, délai admin externe) + décision C8 (M2M) ; PRD paiement à venir
  - name: "admin-panel"
    port: 3010
    database: null
    role: "BFF admin (AD-2, flux A) : vue agrégée orgs + revue/validation KYC + grants proxifiés — ne possède aucune donnée"
    status: "proposed"  # Module 0 (sept. 2026) — tech-spec courte docs/tech-spec-admin-panel-*.md
  - name: "document-service"
    port: 3006
    database: "document_service"
    role: "OCR KYC v1 (AD-2 flux B, DO-1) : consomme kyc.document.uploaded, extraction RCCM/CFE (Tesseract/OcrProvider) → document.extrait"
    status: "proposed"  # Module 0 (sept. 2026) — tech-spec courte docs/tech-spec-document-service-*.md ; extensions (factures fournisseurs, dossiers Crédit) différées → activées par balance-service (Atelier)
  - name: "balance-service"
    port: 3007
    database: "balance_service"
    role: "module AMONT (Atelier Balance) : construit la balance depuis pièces (cahiers/OCR) ou import Sage, + moteur fiscal + conseil ; alimente bilan-service (relying party)"
    status: "proposed"  # Module 1-bis (déc. 2026-mars 2027) — EPIC-017→024 (STORY-076→100) — PRD docs/prd-atelier-balance-2026-07-12.md ; plan docs/sprint-plan-atelier-balance-2026-07-12.md

# ── Programme PLAN FINAL 2026-07-10 : 18 modules → services (ordre de construction) ───────────────
# Phase 0 (socle) = déjà couverte par les sprints ci-dessus (auth, EC relying party, kyc,
# platform-catalog, bilan squelette). Phase 1 = dogfooding interne. Chaque module est planifié
# JIT (1-2 sprints avant) via /bmad:sprint-planning à la sortie de son PRD/tech-spec.
program_backlog:
  phase_1:
    - module: 0
      name: "Chaîne KYC complète (AD-2)"
      services: ["admin-panel", "document-service"]
      target_internal: "2026-09"
      status: "proposed"
      spec: "tech-specs courtes (admin-panel v1 BFF ; document-service v1 OCR KYC strict DO-1)"
    - module: 1
      name: "Bilan & prévisionnel (NB-1)"
      services: ["bilan-service"]
      epic: "EPIC-008 (squelette) + EPIC-009 (moteur v1)"
      target_internal: "2026-10"
      status: "proposed"
      spec: "PRD Bilan (import balance + table SYSCOHADA/SFD + états + prévisionnel)"
    - module: "1b"
      name: "Atelier Balance & Fiscalité (module amont du Bilan)"
      services: ["balance-service"]
      epic: "EPIC-017→EPIC-024 (STORY-076→100)"
      target_internal: "2027-03"
      status: "proposed"
      spec: "PRD docs/prd-atelier-balance-2026-07-12.md + plan docs/sprint-plan-atelier-balance-2026-07-12.md. AMONT du bilan-service : profil société+OCR, référentiels SN+SMT+paquet fiscal, chemin A (cahiers/OCR), import/migration Sage (reprise à-nouveaux), rapprochement bancaire, moteur fiscal (IS=max(MFP,IS)), conseil fiscal. Décisions D1→D12. 2 profils clients (structuré Sage / informel PME)."
    - module: 2
      name: "PI SPI (PA-1)"
      services: ["paiement-service"]
      epic: "EPIC-004 (rescopé)"
      target_internal: "2027-04"  # décalé (Module 1-bis inséré avant) — JIT, sans impact (PS-1/C8)
      status: "proposed"
      spec: "PRD paiement (SpiProvider BCEAO + FedapayProvider) ; dépend PS-1 (délai admin externe) + C8"
    - module: 3
      name: "Fiscalité (RE-SCOPÉ)"
      services: ["fiscal-service"]
      target_internal: "2027-05"
      status: "proposed"
      spec: "RE-SCOPÉ 2026-07-12 : le CALCUL fiscal (résultat fiscal, IS=max(MFP,IS), TVA, TPU, conseil) est ANTICIPÉ dans Module 1-bis (balance-service EPIC-023/024). Reste à Module 3 : télédéclaration/dépôt DSF, TVA déclarative périodique avancée, autres impôts. Décision FI-2 (moteur d'écritures comptabilite-service) toujours à trancher ici."
    - module: 4
      name: "Conformité BCEAO & LCB/FT"
      services: ["conformite-service"]
      target_internal: "2027-04"
      status: "proposed"
      spec: "screening sanctions/PEP, seuils, audit, reporting CENTIF (patron kyc réutilisé)"
    - module: null
      name: "notification-service (insertion socle avant module 5)"
      services: ["notification-service"]
      status: "proposed"
      spec: "e-mail/SMS centralisés — socle des modules 5, 11, 17"
    - module: 5
      name: "Support client / Relance"
      services: ["support-service"]
      target_internal: "2027-06"
      status: "proposed"
  phase_2:
    - { module: 6,  name: "Commercial / Agent terrain", services: ["crm-service"],                status: "proposed" }
    - { module: 7,  name: "Crédit (cœur IMF)",          services: ["credit-service"],             status: "proposed" }
    - { module: 8,  name: "Équipe",                     services: ["equipe-service"],             status: "proposed" }
    - { module: 9,  name: "Dashboard",                  services: ["reporting-service"],          status: "proposed" }
    - { module: 10, name: "Collecte",                   services: ["collecte-service"],           status: "proposed" }
    - { module: 11, name: "Recouvrement",               services: ["recouvrement-service"],       status: "proposed" }
    - { module: 12, name: "Finance (Transactions)",     services: ["tresorerie-service"],         status: "proposed" }
    - { module: 13, name: "Stock",                      services: ["stock-service"],              status: "proposed" }
    - { module: 14, name: "Catalogue produits",         services: ["catalogue-produits-service"], status: "proposed" }
    - { module: 15, name: "Commande",                   services: ["commande-service"],           status: "proposed" }
    - { module: 16, name: "Facturation",                services: ["facturation-service"],        status: "proposed" }
    - { module: 17, name: "Marketing",                  services: ["marketing-service"],          status: "proposed" }
    - { module: 18, name: "Point de vente (PDV)",       services: ["pdv-service"],                status: "proposed" }
  deferred_foundations:
    - name: "comptabilite-service (moteur d'écritures)"
      trigger: "TVA fine (module 3) / 1er client voulant saisir / auto Facturation→compta (FI-2)"
      status: "deferred"
    - name: "document-service (extensions : factures fournisseurs, dossiers Crédit)"
      trigger: "compta/facturation ; module 7 Crédit"
      status: "deferred"
    - name: "ia-service (Qwen — anomalies, imputation, analyse, chat)"
      trigger: "passage équipe 5/7 ou demande client (propositions IA-0…IA-5)"
      status: "deferred"
    - name: "verticaux formels (distributeur / microfinance / assurance / Money Vibes App)"
      trigger: "1er client externe de chaque segment (forme mince : plans, abonnement, provisioning)"
      status: "deferred"

