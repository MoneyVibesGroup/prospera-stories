  # ⚠️ ORDRE balance/bilan — POURQUOI CE N'EST PAS "À L'ENVERS" (clarification 2026-07-13) :
  #   La dépendance de données va TOUJOURS balance → bilan (amont → aval), jamais l'inverse. Le split D14
