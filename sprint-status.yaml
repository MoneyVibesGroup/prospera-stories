# ── Programme PLAN FINAL 2026-07-10 : 18 modules → services (ordre de construction) ───────────────
# Phase 0 (socle) = déjà couverte par les sprints ci-dessus (auth, EC relying party, kyc,
# platform-catalog, bilan squelette). Phase 1 = dogfooding interne. Chaque module est planifié
# JIT (1-2 sprints avant) via /bmad:sprint-planning à la sortie de son PRD/tech-spec.
program_backlog:
  phase_1:
    - module: 0
      name: "Chaîne KYC complète (AD-2)"
      services: ["admin-panel", "document-service"]
      target_internal: "2026-09"
      status: "proposed"
      spec: "tech-specs courtes (admin-panel v1 BFF ; document-service v1 OCR KYC strict DO-1)"
    - module: 1
      name: "Bilan & prévisionnel (NB-1)"
      services: ["bilan-service"]
      epic: "EPIC-008 (squelette) + EPIC-009 (moteur v1)"
      target_internal: "2026-10"
      status: "proposed"
      spec: "PRD Bilan (import balance + table SYSCOHADA/SFD + états + prévisionnel)"
    - module: "1b"
      name: "Atelier Balance & Fiscalité (module amont du Bilan)"
      services: ["balance-service"]
      epic: "EPIC-017→EPIC-024 (STORY-076→100)"
      target_internal: "2027-03"
      status: "proposed"
      spec: "PRD docs/prd-atelier-balance-2026-07-12.md + plan docs/sprint-plan-atelier-balance-2026-07-12.md. AMONT du bilan-service : profil société+OCR, référentiels SN+SMT+paquet fiscal, chemin A (cahiers/OCR), import/migration Sage (reprise à-nouveaux), rapprochement bancaire, moteur fiscal (IS=max(MFP,IS)), conseil fiscal. Décisions D1→D12. 2 profils clients (structuré Sage / informel PME)."
    - module: 2
      name: "PI SPI (PA-1)"
      services: ["paiement-service"]
      epic: "EPIC-004 (rescopé)"
      target_internal: "2027-04"  # décalé (Module 1-bis inséré avant) — JIT, sans impact (PS-1/C8)
      status: "proposed"
      spec: "PRD paiement (SpiProvider BCEAO + FedapayProvider) ; dépend PS-1 (délai admin externe) + C8"
    - module: 3
      name: "Fiscalité (RE-SCOPÉ)"
      services: ["fiscal-service"]
      target_internal: "2027-05"
      status: "proposed"
      spec: "RE-SCOPÉ 2026-07-12 : le CALCUL fiscal (résultat fiscal, IS=max(MFP,IS), TVA, TPU, conseil) est ANTICIPÉ dans Module 1-bis (balance-service EPIC-023/024). Reste à Module 3 : télédéclaration/dépôt DSF, TVA déclarative périodique avancée, autres impôts. Décision FI-2 (moteur d'écritures comptabilite-service) toujours à trancher ici."
    - module: 4
      name: "Conformité BCEAO & LCB/FT"
      services: ["conformite-service"]
      target_internal: "2027-04"
      status: "proposed"
      spec: "screening sanctions/PEP, seuils, audit, reporting CENTIF (patron kyc réutilisé)"
    - module: null
      name: "notification-service (insertion socle avant module 5)"
      services: ["notification-service"]
      status: "proposed"
      spec: "e-mail/SMS centralisés — socle des modules 5, 11, 17"
    - module: 5
      name: "Support client / Relance"
      services: ["support-service"]
      target_internal: "2027-06"
      status: "proposed"
  phase_2:
    - { module: 6,  name: "Commercial / Agent terrain", services: ["crm-service"],                status: "proposed" }
    - { module: 7,  name: "Crédit (cœur IMF)",          services: ["credit-service"],             status: "proposed" }
    - { module: 8,  name: "Équipe",                     services: ["equipe-service"],             status: "proposed" }
    - { module: 9,  name: "Dashboard",                  services: ["reporting-service"],          status: "proposed" }
    - { module: 10, name: "Collecte",                   services: ["collecte-service"],           status: "proposed" }
    - { module: 11, name: "Recouvrement",               services: ["recouvrement-service"],       status: "proposed" }
    - { module: 12, name: "Finance (Transactions)",     services: ["tresorerie-service"],         status: "proposed" }
    - { module: 13, name: "Stock",                      services: ["stock-service"],              status: "proposed" }
    - { module: 14, name: "Catalogue produits",         services: ["catalogue-produits-service"], status: "proposed" }
    - { module: 15, name: "Commande",                   services: ["commande-service"],           status: "proposed" }
    - { module: 16, name: "Facturation",                services: ["facturation-service"],        status: "proposed" }
    - { module: 17, name: "Marketing",                  services: ["marketing-service"],          status: "proposed" }
    - { module: 18, name: "Point de vente (PDV)",       services: ["pdv-service"],                status: "proposed" }
  deferred_foundations:
    - name: "comptabilite-service (moteur d'écritures)"
      trigger: "TVA fine (module 3) / 1er client voulant saisir / auto Facturation→compta (FI-2)"
      status: "deferred"
    - name: "document-service (extensions : factures fournisseurs, dossiers Crédit)"
      trigger: "compta/facturation ; module 7 Crédit"
      status: "deferred"
    - name: "ia-service (Qwen — anomalies, imputation, analyse, chat)"
      trigger: "passage équipe 5/7 ou demande client (propositions IA-0…IA-5)"
      status: "deferred"
    - name: "verticaux formels (distributeur / microfinance / assurance / Money Vibes App)"
      trigger: "1er client externe de chaque segment (forme mince : plans, abonnement, provisioning)"
      status: "deferred"

