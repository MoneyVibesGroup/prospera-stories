      - { id: "AP-03", app: "admin", title: "Revue KYC (file, détail + URLs présignées, approve/reject + motif)", epic: "AP-EPIC-001", points: 5, status: "ready-for-dev", backend_ready: "S10", backend_ref: "STORY-013(done),048", note: "revue kyc-service dispo (STORY-013 done) ; passage par le BFF admin-panel quand STORY-048 (S10)" }

  # ── Sprint 4 : compléter la tour de contrôle (catalogue, entitlements, provisioning) ── 🏁 admin v1
  - sprint_number: 4
    name: "Tour de contrôle complète : catalogue + entitlements + provisioning + dashboard"
    status: "not_started"
