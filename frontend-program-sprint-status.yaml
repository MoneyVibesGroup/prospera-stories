# ═══════════════════════════════════════════════════════════════════════════════════════
# TRACKER PROGRAMME FRONTEND (VUE UNIFIÉE) — équivalent frontend de docs/sprint-status.yaml
# ───────────────────────────────────────────────────────────────────────────────────────
# UNE seule liste, priorisée, de TOUTES les stories frontend des DEUX apps du programme,
# sprint par sprint (comme le backend liste tous les services dans un seul fichier).
#   • app "client" = prospera-frontend-expert-comptable (app cliente config-driven, vertical cabinet)
#   • app "admin"  = prospera-admin-panel (console interne Money Vibes, PLATFORM_ADMIN)
#
# Détail/contexte par app : frontend-sprint-plan-expert-comptable-2026-07-08.md (+ addendum v2),
# frontend-sprint-plan-admin-panel-2026-07-12.md. Les trackers par-app (frontend-sprint-status.yaml,
# frontend-admin-sprint-status.yaml) restent la vue de périmètre ; CE fichier est la SÉQUENCE maître.
#
# PRINCIPES DE PRIORITÉ (dans l'ordre) :
#   1. Backend prêt d'abord — chaque story porte `backend_ready` (done | S7..S15) ; ne pas démarrer avant.
#   2. Dogfooding DG-1 — la tour de contrôle admin (revue KYC + entitlements + provisioning) vient AVANT
#      le Bilan : il faut activer l'org MV et « allumer » le module avant qu'il ne serve.
#   3. Bilan (gros livrable fonctionnel) — gated backend S8-14.
#   4. Paiement — dernier (Module 2, paiement-service, S15).
#
# `backend_ready` = sprint backend où l'API requise existe (docs/sprint-status.yaml).
#   done = déjà livré ; Sx = sprint backend x. Le frontend TRAILE le backend (~1 sprint).
#
# STATUTS : backlog | ready-for-dev | in-progress | review | done
# ═══════════════════════════════════════════════════════════════════════════════════════

apps:
  client:
    name: "prospera-frontend-expert-comptable"
    role: "app cliente unique config-driven (vertical pilote = cabinet)"
    personas: ["TENANT_ADMIN", "TENANT_USER"]
  admin:
    name: "prospera-admin-panel"
    role: "console interne Money Vibes (BFF, sans base) — tour de contrôle"
    personas: ["PLATFORM_ADMIN"]

# Décisions transverses (2026-07-09/12) : gateway unique + types OpenAPI ; refresh cookie httpOnly (BFF) ;
# app cliente « 1 code / N déploiements isolés » (Docker, env-configurable) ; modules pilotés par entitlements.

sprints:

  # ══════════ HISTORIQUE / EN COURS (app cliente — auth + activation) ══════════

  - sprint_number: 1
    name: "Socle + Authentification (cabinet)"
    status: "review"           # FE-001→007 implémentées, en revue
    committed_points: 24
    goal: "Socle config-driven (shadcn/ui, client API gateway + BFF cookie/refresh RS256, layout) + inscription, vérif e-mail, login/session, invitation."
    stories:
      - { id: "FE-001", app: "client", title: "Socle projet (shadcn/ui, structure, i18n FR, qualité + CI, config par env)", epic: "FE-EPIC-000", points: 3, status: "review", backend_ready: "done", backend_ref: "STORY-001,003" }
      - { id: "FE-002", app: "client", title: "Client API (gateway) + BFF cookie httpOnly + refresh silencieux", epic: "FE-EPIC-000", points: 5, status: "review", backend_ready: "done", backend_ref: "STORY-005,024,028" }
      - { id: "FE-003", app: "client", title: "Layout applicatif + navigation + design system de base", epic: "FE-EPIC-000", points: 3, status: "review", backend_ready: "done", backend_ref: "-" }
      - { id: "FE-004", app: "client", title: "Inscription cabinet", epic: "FE-EPIC-001", points: 3, status: "review", backend_ready: "done", backend_ref: "STORY-004,023" }
      - { id: "FE-005", app: "client", title: "Login + session + protection des routes", epic: "FE-EPIC-001", points: 5, status: "review", backend_ready: "done", backend_ref: "STORY-005,024" }
      - { id: "FE-006", app: "client", title: "Vérification e-mail (landing + renvoi + garde)", epic: "FE-EPIC-001", points: 3, status: "review", backend_ready: "done", backend_ref: "STORY-006,025" }
      - { id: "FE-007", app: "client", title: "Acceptation d'invitation", epic: "FE-EPIC-002", points: 2, status: "review", backend_ready: "done", backend_ref: "STORY-008,025" }

  - sprint_number: 2
    name: "Utilisateurs + KYC + Onboarding (cabinet)"
    status: "in-progress"      # FE-008/009 review, FE-010 review (PR #7)
    committed_points: 13
    goal: "Gestion des utilisateurs, upload KYC (RCCM/CFE), bandeau d'onboarding + statut KYC (stepper). ← état actuel : s'arrête à FE-010."
    stories:
      - { id: "FE-008", app: "client", title: "Gestion des utilisateurs (liste, rôles, invitation, suspension)", epic: "FE-EPIC-002", points: 5, status: "review", backend_ready: "done", backend_ref: "STORY-008,009,026" }
