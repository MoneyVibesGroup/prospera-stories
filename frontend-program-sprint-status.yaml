      - { id: "AP-07", app: "admin", title: "Dashboard plateforme + e2e chaîne KYC bout-en-bout 🏁", epic: "AP-EPIC-003", points: 5, status: "ready-for-dev", backend_ready: "S10", backend_ref: "STORY-049" }

