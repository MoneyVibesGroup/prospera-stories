      - { id: "FE-B04", app: "client", title: "Contrôle d'intégrité de la balance (équilibre, anomalies, blocage) — FR-002", epic: "FE-EPIC-005", points: 3, status: "ready-for-dev", backend_ready: "S10", backend_ref: "STORY-051" }
      - { id: "FE-B05", app: "client", title: "Import/association comparatif N-1 (colonnes N/N-1) — FR-003", epic: "FE-EPIC-005", points: 3, status: "ready-for-dev", backend_ready: "S10", backend_ref: "STORY-052" }

