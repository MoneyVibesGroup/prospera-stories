  - sprint_number: 3
    name: "Activation : shell modules cabinet + socle admin + revue KYC"
    status: "not_started"
    committed_points: 20
    goal: "Le cabinet affiche ses modules selon les entitlements (shell config-driven) ; l'admin Money Vibes se connecte, voit les organisations et revoit/valide le KYC."
    stories:
      - { id: "FE-014", app: "client", title: "Accès modules & entitlements : home des modules + shell config-driven (n'affiche que les modules ACTIFS ; gate KYC/abonnement/entitlement)", epic: "FE-EPIC-006", points: 5, status: "ready-for-dev", backend_ready: "S7", backend_ref: "STORY-014,033,034", note: "gate KYC/sub déjà dispo (/tenant/state) ; volet entitlement complet quand catalog (S7) livré" }
      - { id: "AP-01", app: "admin", title: "Socle admin-panel (BFF, login PLATFORM_ADMIN, RBAC strict, layout console)", epic: "AP-EPIC-000", points: 5, status: "ready-for-dev", backend_ready: "S9", backend_ref: "STORY-046,024,026" }
