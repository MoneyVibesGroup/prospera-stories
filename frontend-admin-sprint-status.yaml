# ═══════════════════════════════════════════════════════════════════════════════════════
# ADMIN-PANEL Money Vibes — console d'administration INTERNE (persona PLATFORM_ADMIN).
# Tour de contrôle de l'écosystème : orgs, revue KYC, entitlements, catalogue, dashboard,
# provisioning des verticaux. C'est DEPUIS ICI qu'est configuré ce que les apps clientes
# affichent (octroi manuel d'entitlement en dogfooding, DG-1).
#
# Nature : BFF (aucune base) qui agrège/proxifie auth-service + kyc-service +
# platform-catalog-service en relayant le JWT admin (backend AD-2, tech-spec-admin-panel-*).
# Hébergé par Money Vibes (instance unique interne, containerisée).
#
# Périmètre v1 : Orgs + revue KYC · Entitlements + catalogue · Dashboard + provisioning.
# Différé : Plans/abonnements (Module 2 paiement-service) ; multi-instance à distance (JIT).
#
# Le frontend admin SUIT la dispo backend : catalog (S7), scaffold admin-panel + vue orgs (S9),
# actions proxifiées + jalon chaîne KYC (S10). Voir docs/sprint-status.yaml.
# ═══════════════════════════════════════════════════════════════════════════════════════

frontend:
  name: "prospera-admin-panel"
  role: "console interne Money Vibes (PLATFORM_ADMIN) — BFF sans base, tour de contrôle"
  framework: "Next.js 16 (App Router, src/)"
  stack: "TypeScript · Tailwind + shadcn/ui · TanStack Query · React Hook Form + Zod · next-intl (FR)"
  nature: "BFF (Route Handlers) — agrège/proxifie auth + kyc + catalog, relais JWT admin"
  deployment: "hébergé par Money Vibes (instance interne unique), Docker"
  shared_socle: "réutilise design system / client API / BFF cookie / shell communs à l'app cliente"

# Décisions transverses (mêmes que l'app cliente) :
#  - Gateway unique (préfixes /auth /kyc /catalog /admin) ; types TS depuis l'OpenAPI.
#  - Refresh token cookie httpOnly via BFF ; access token en mémoire.
#  - RBAC PLATFORM_ADMIN strict (actions inter-org).

